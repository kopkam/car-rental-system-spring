<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{login.title}">Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header text-center">
                    <h3 th:text="#{login.title}">Login</h3>
                </div>
                <div class="card-body">
                    <div th:if="${param.error}" class="alert alert-danger">
                        <span th:text="#{login.error}">Invalid username or password</span>
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success">
                        <span th:text="#{login.success}">Logged out successfully</span>
                    </div>
                    <div th:if="${message}" class="alert alert-info">
                        <span th:text="${message}"></span>
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label" th:text="#{login.username}">Username</label>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label" th:text="#{login.password}">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary" th:text="#{login.submit}">Login</button>
                        </div>
                    </form>

                    <div class="text-center mt-3">
                        <a th:href="@{/register}" th:text="#{login.register}">Don't have an account? Register here</a>
                    </div>

                    <div class="text-center mt-3">
                        <a th:href="@{/(lang=en)}">English</a> |
                        <a th:href="@{/(lang=pl)}">Polski</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
