<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{register.title}">Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body class="bg-light">
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header text-center">
                    <h3 th:text="#{register.title}">Register</h3>
                </div>
                <div class="card-body">
                    <form th:object="${user}" th:action="@{/register}" method="post">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="username" class="form-label" th:text="#{register.username}">Username</label>
                                    <input type="text" class="form-control" th:field="*{username}" required>
                                    <div th:if="${#fields.hasErrors('username')}" class="text-danger" th:errors="*{username}"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="email" class="form-label" th:text="#{register.email}">Email</label>
                                    <input type="email" class="form-control" th:field="*{email}" required>
                                    <div th:if="${#fields.hasErrors('email')}" class="text-danger" th:errors="*{email}"></div>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="firstName" class="form-label" th:text="#{register.firstName}">First Name</label>
                                    <input type="text" class="form-control" th:field="*{firstName}" required>
                                    <div th:if="${#fields.hasErrors('firstName')}" class="text-danger" th:errors="*{firstName}"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="lastName" class="form-label" th:text="#{register.lastName}">Last Name</label>
                                    <input type="text" class="form-control" th:field="*{lastName}" required>
                                    <div th:if="${#fields.hasErrors('lastName')}" class="text-danger" th:errors="*{lastName}"></div>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="password" class="form-label" th:text="#{register.password}">Password</label>
                                    <input type="password" class="form-control" th:field="*{password}" required>
                                    <div th:if="${#fields.hasErrors('password')}" class="text-danger" th:errors="*{password}"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="confirmPassword" class="form-label" th:text="#{register.confirmPassword}">Confirm Password</label>
                                    <input type="password" class="form-control" th:field="*{confirmPassword}" required>
                                    <div th:if="${#fields.hasErrors('confirmPassword')}" class="text-danger" th:errors="*{confirmPassword}"></div>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Please verify you're not a robot:</label>
                            <div class="g-recaptcha" th:attr="data-sitekey=${recaptchaSiteKey}"></div>
                            <div th:if="${#fields.hasErrors('captcha')}" class="text-danger" th:errors="*{captcha}"></div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary" th:text="#{register.submit}">Register</button>
                        </div>
                    </form>

                    <div class="text-center mt-3">
                        <a th:href="@{/login}" th:text="#{register.login}">Already have an account? Login here</a>
                    </div>

                    <div class="text-center mt-3">
                        <a th:href="@{/register(lang=en)}">English</a> |
                        <a th:href="@{/register(lang=pl)}">Polski</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
