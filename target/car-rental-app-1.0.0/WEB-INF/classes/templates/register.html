<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{register.title}">Car Rental - Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #e74c3c;
            --success-color: #27ae60;
            --warning-color: #f39c12;
            --background-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            background: var(--background-gradient);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            padding: 2rem 0;
        }

        /* Animated background elements */
        body::before {
            content: '';
            position: absolute;
            top: -5%;
            left: -5%;
            width: 150px;
            height: 150px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
            animation: float 12s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -5%;
            right: -5%;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            animation: float 16s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(180deg); }
        }

        .register-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            padding: 3rem;
            width: 100%;
            max-width: 700px;
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .register-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .register-header h1 {
            color: var(--primary-color);
            font-weight: 700;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .register-header .subtitle {
            color: #6c757d;
            font-size: 1rem;
            font-weight: 400;
        }

        .brand-icon {
            font-size: 3rem;
            background: linear-gradient(135deg, var(--secondary-color), #2980b9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        .form-floating {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .form-group .input-icon {
            color: var(--secondary-color);
            font-size: 1.5rem;
            min-width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 1.8rem;
            flex-shrink: 0;
        }

        .form-group .input-wrapper {
            flex: 1;
        }

        .form-group .input-wrapper label {
            color: var(--primary-color);
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: block;
            font-size: 0.9rem;
        }

        .form-group .input-wrapper input {
            border-radius: 12px;
            border: 2px solid #e9ecef;
            padding: 0.8rem 1rem;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.8);
            width: 100%;
            height: 45px;
        }

        .form-group .input-wrapper input:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.25);
            background: rgba(255,255,255,1);
            outline: none;
        }

        .form-group .input-wrapper input.is-invalid {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 0.2rem rgba(231, 76, 60, 0.25);
        }

        .form-floating input:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.25);
            background: rgba(255,255,255,1);
        }

        .form-floating input.is-invalid {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 0.2rem rgba(231, 76, 60, 0.25);
        }

        .text-danger {
            font-size: 0.875rem;
            margin-top: 0.5rem;
            color: var(--accent-color);
        }

        .register-btn {
            background: linear-gradient(135deg, var(--success-color), #229954);
            border: none;
            border-radius: 15px;
            padding: 1rem 2rem;
            font-weight: 600;
            font-size: 1.1rem;
            color: white;
            width: 100%;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(39, 174, 96, 0.3);
            position: relative;
            overflow: hidden;
        }

        .register-btn:hover {
            background: linear-gradient(135deg, #229954, #1e8449);
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(39, 174, 96, 0.4);
            color: white;
        }

        .register-btn:active {
            transform: translateY(0);
        }

        .captcha-container {
            background: rgba(52, 152, 219, 0.05);
            border-radius: 15px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 2px solid rgba(52, 152, 219, 0.1);
            text-align: center;
        }

        .captcha-label {
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 1rem;
            display: block;
        }

        .login-link {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .login-link a {
            color: var(--secondary-color);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .login-link a:hover {
            color: #2980b9;
            text-decoration: underline;
        }

        .language-selector {
            text-align: center;
            padding: 1rem;
            background: rgba(52, 152, 219, 0.1);
            border-radius: 15px;
            margin-top: 1rem;
        }

        .language-selector a {
            color: var(--secondary-color);
            text-decoration: none;
            font-weight: 600;
            margin: 0 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .language-selector a:hover {
            background: var(--secondary-color);
            color: white;
            transform: translateY(-2px);
        }

        .divider {
            text-align: center;
            margin: 1rem 0;
            position: relative;
            color: #6c757d;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, #dee2e6, transparent);
        }

        .divider span {
            background: rgba(255,255,255,0.95);
            padding: 0 1rem;
            position: relative;
        }

        /* Loading animation */
        .btn-loading {
            position: relative;
            pointer-events: none;
        }

        .btn-loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 2px solid transparent;
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .register-container {
                margin: 1rem;
                padding: 2rem;
                border-radius: 20px;
                max-width: none;
            }

            .register-header h1 {
                font-size: 1.5rem;
            }

            .brand-icon {
                font-size: 2.5rem;
            }

            .form-row {
                flex-direction: column;
            }

            .form-floating {
                margin-bottom: 1rem;
            }
        }

        /* Form row for side-by-side inputs */
        .form-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 0;
        }

        .form-row .form-floating {
            flex: 1;
        }

        /* Ripple effect */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0);
            animation: ripple-animation 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple-animation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* Password strength indicator */
        .password-strength {
            margin-top: 0.5rem;
            height: 4px;
            background: #e9ecef;
            border-radius: 2px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .strength-weak { background: var(--accent-color); width: 25%; }
        .strength-fair { background: var(--warning-color); width: 50%; }
        .strength-good { background: var(--secondary-color); width: 75%; }
        .strength-strong { background: var(--success-color); width: 100%; }
    </style>
</head>
<body>
<div class="register-container">
    <div class="register-header">
        <div class="brand-icon">
            <i class="bi bi-person-plus-fill"></i>
        </div>
        <h1 th:text="#{register.title}">Create Account</h1>
        <p class="subtitle" th:text="#{register.subtitle}">Join our car rental service today</p>
    </div>

    <!-- Registration Form -->
    <form th:object="${user}" th:action="@{/register}" method="post" id="registerForm">

        <!-- Username & Email Row -->
        <div class="form-row">
            <div class="form-group">
                <i class="bi bi-person input-icon"></i>
                <div class="input-wrapper">
                    <label th:text="#{register.username}">Username</label>
                    <input type="text" class="form-control" th:field="*{username}"
                           placeholder="Enter username" required autocomplete="username">
                    <div th:if="${#fields.hasErrors('username')}" class="text-danger" th:errors="*{username}"></div>
                </div>
            </div>

            <div class="form-group">
                <i class="bi bi-envelope input-icon"></i>
                <div class="input-wrapper">
                    <label th:text="#{register.email}">Email</label>
                    <input type="email" class="form-control" th:field="*{email}"
                           placeholder="Enter email" required autocomplete="email">
                    <div th:if="${#fields.hasErrors('email')}" class="text-danger" th:errors="*{email}"></div>
                </div>
            </div>
        </div>

        <!-- First Name & Last Name Row -->
        <div class="form-row">
            <div class="form-group">
                <i class="bi bi-person-badge input-icon"></i>
                <div class="input-wrapper">
                    <label th:text="#{register.firstName}">First Name</label>
                    <input type="text" class="form-control" th:field="*{firstName}"
                           placeholder="Enter first name" required autocomplete="given-name">
                    <div th:if="${#fields.hasErrors('firstName')}" class="text-danger" th:errors="*{firstName}"></div>
                </div>
            </div>

            <div class="form-group">
                <i class="bi bi-person-badge input-icon"></i>
                <div class="input-wrapper">
                    <label th:text="#{register.lastName}">Last Name</label>
                    <input type="text" class="form-control" th:field="*{lastName}"
                           placeholder="Enter last name" required autocomplete="family-name">
                    <div th:if="${#fields.hasErrors('lastName')}" class="text-danger" th:errors="*{lastName}"></div>
                </div>
            </div>
        </div>

        <!-- Password & Confirm Password Row -->
        <div class="form-row">
            <div class="form-group">
                <i class="bi bi-lock input-icon"></i>
                <div class="input-wrapper">
                    <label th:text="#{register.password}">Password</label>
                    <input type="password" class="form-control" th:field="*{password}"
                           placeholder="Enter password" required autocomplete="new-password" id="password">
                    <div class="password-strength">
                        <div class="password-strength-bar" id="strengthBar"></div>
                    </div>
                    <div th:if="${#fields.hasErrors('password')}" class="text-danger" th:errors="*{password}"></div>
                </div>
            </div>

            <div class="form-group">
                <i class="bi bi-lock-fill input-icon"></i>
                <div class="input-wrapper">
                    <label th:text="#{register.confirmPassword}">Confirm Password</label>
                    <input type="password" class="form-control" th:field="*{confirmPassword}"
                           placeholder="Confirm password" required autocomplete="new-password" id="confirmPassword">
                    <div th:if="${#fields.hasErrors('confirmPassword')}" class="text-danger" th:errors="*{confirmPassword}"></div>
                </div>
            </div>
        </div>

        <!-- Captcha -->
        <div class="captcha-container">
            <label class="captcha-label" th:text="#{register.captcha}">Please verify you're not a robot:</label>
            <div class="g-recaptcha" th:attr="data-sitekey=${recaptchaSiteKey}"></div>
            <div th:if="${#fields.hasErrors('captcha')}" class="text-danger" th:errors="*{captcha}"></div>
        </div>

        <button type="submit" class="btn register-btn" id="registerButton">
            <i class="bi bi-person-plus me-2"></i>
            <span th:text="#{register.submit}">Create Account</span>
        </button>
    </form>

    <!-- Login Link -->
    <div class="login-link">
        <a th:href="@{/login}">
            <i class="bi bi-box-arrow-in-right me-1"></i>
            <span th:text="#{register.login}">Already have an account? Login here</span>
        </a>
    </div>

    <div class="divider">
        <span th:text="#{register.or}">or</span>
    </div>

    <!-- Language Selector -->
    <div class="language-selector">
        <i class="bi bi-globe me-2"></i>
        <a href="?lang=en">🇺🇸 English</a>
        <a href="?lang=pl">🇵🇱 Polski</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Animate register container on load
        const container = document.querySelector('.register-container');
        container.style.opacity = '0';
        container.style.transform = 'translateY(30px)';
        container.style.transition = 'opacity 0.8s ease, transform 0.8s ease';

        setTimeout(() => {
            container.style.opacity = '1';
            container.style.transform = 'translateY(0)';
        }, 100);

        // Password strength checker
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('strengthBar');

        if (passwordInput && strengthBar) {
            passwordInput.addEventListener('input', function() {
                const password = this.value;
                let strength = 0;

                // Check password criteria
                if (password.length >= 8) strength++;
                if (/[a-z]/.test(password)) strength++;
                if (/[A-Z]/.test(password)) strength++;
                if (/[0-9]/.test(password)) strength++;
                if (/[^A-Za-z0-9]/.test(password)) strength++;

                // Update strength bar
                strengthBar.className = 'password-strength-bar';
                if (strength >= 1) strengthBar.classList.add('strength-weak');
                if (strength >= 2) strengthBar.classList.add('strength-fair');
                if (strength >= 4) strengthBar.classList.add('strength-good');
                if (strength >= 5) strengthBar.classList.add('strength-strong');
            });
        }

        // Password confirmation validation
        const confirmPasswordInput = document.getElementById('confirmPassword');
        if (confirmPasswordInput) {
            confirmPasswordInput.addEventListener('input', function() {
                if (passwordInput.value !== this.value) {
                    this.classList.add('is-invalid');
                } else {
                    this.classList.remove('is-invalid');
                }
            });
        }

        // Add ripple effect to register button
        const registerButton = document.getElementById('registerButton');
        registerButton.addEventListener('click', function(e) {
            const ripple = document.createElement('span');
            const rect = this.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            const x = e.clientX - rect.left - size / 2;
            const y = e.clientY - rect.top - size / 2;

            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            ripple.classList.add('ripple');

            this.style.position = 'relative';
            this.style.overflow = 'hidden';
            this.appendChild(ripple);

            setTimeout(() => {
                ripple.remove();
            }, 600);
        });

        // Form submission loading state
        const registerForm = document.getElementById('registerForm');
        registerForm.addEventListener('submit', function() {
            registerButton.classList.add('btn-loading');
            registerButton.querySelector('span').style.opacity = '0';
        });

        // Focus enhancement
        const inputs = document.querySelectorAll('.input-wrapper input');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                const icon = this.closest('.form-group').querySelector('.input-icon');
                if (icon) icon.style.color = 'var(--secondary-color)';
            });

            input.addEventListener('blur', function() {
                const icon = this.closest('.form-group').querySelector('.input-icon');
                if (!this.value && icon) {
                    icon.style.color = 'var(--secondary-color)';
                }
            });
        });
    });
</script>
</body>
</html>
