<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{login.title}">Car Rental - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #e74c3c;
            --success-color: #27ae60;
            --warning-color: #f39c12;
            --background-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            background: var(--background-gradient);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background elements */
        body::before {
            content: '';
            position: absolute;
            top: -10%;
            left: -10%;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            animation: float 15s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: -5%;
            right: -5%;
            width: 150px;
            height: 150px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            animation: float 20s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(180deg); }
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h1 {
            color: var(--primary-color);
            font-weight: 700;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-header .subtitle {
            color: #6c757d;
            font-size: 1rem;
            font-weight: 400;
        }

        .brand-icon {
            font-size: 3rem;
            background: linear-gradient(135deg, var(--secondary-color), #2980b9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        .form-floating {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .form-group .input-icon {
            color: var(--secondary-color);
            font-size: 1.5rem;
            min-width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 1.8rem;
            flex-shrink: 0;
        }

        .form-group .input-wrapper {
            flex: 1;
        }

        .form-group .input-wrapper label {
            color: var(--primary-color);
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: block;
            font-size: 0.9rem;
        }

        .form-group .input-wrapper input {
            border-radius: 12px;
            border: 2px solid #e9ecef;
            padding: 0.8rem 1rem;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.8);
            width: 100%;
            height: 45px;
        }

        .form-group .input-wrapper input:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.25);
            background: rgba(255,255,255,1);
            outline: none;
        }

        .form-group .input-wrapper input.is-invalid {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 0.2rem rgba(231, 76, 60, 0.25);
        }

        .login-btn {
            background: linear-gradient(135deg, var(--secondary-color), #2980b9);
            border: none;
            border-radius: 15px;
            padding: 1rem 2rem;
            font-weight: 600;
            font-size: 1.1rem;
            color: white;
            width: 100%;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(52, 152, 219, 0.3);
            position: relative;
            overflow: hidden;
        }

        .login-btn:hover {
            background: linear-gradient(135deg, #2980b9, #1c5a7e);
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(52, 152, 219, 0.4);
            color: white;
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .alert {
            border-radius: 15px;
            border: none;
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        .alert-danger {
            background: linear-gradient(135deg, rgba(231, 76, 60, 0.1), rgba(192, 57, 43, 0.1));
            color: var(--accent-color);
            border-left: 4px solid var(--accent-color);
        }

        .alert-success {
            background: linear-gradient(135deg, rgba(39, 174, 96, 0.1), rgba(34, 153, 84, 0.1));
            color: var(--success-color);
            border-left: 4px solid var(--success-color);
        }

        .alert-info {
            background: linear-gradient(135deg, rgba(52, 152, 219, 0.1), rgba(41, 128, 185, 0.1));
            color: var(--secondary-color);
            border-left: 4px solid var(--secondary-color);
        }

        .register-link {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .register-link a {
            color: var(--secondary-color);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .register-link a:hover {
            color: #2980b9;
            text-decoration: underline;
        }

        .language-selector {
            text-align: center;
            padding: 1rem;
            background: rgba(52, 152, 219, 0.1);
            border-radius: 15px;
            margin-top: 1rem;
        }

        .language-selector a {
            color: var(--secondary-color);
            text-decoration: none;
            font-weight: 600;
            margin: 0 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .language-selector a:hover {
            background: var(--secondary-color);
            color: white;
            transform: translateY(-2px);
        }

        .divider {
            text-align: center;
            margin: 1rem 0;
            position: relative;
            color: #6c757d;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, #dee2e6, transparent);
        }

        .divider span {
            background: rgba(255,255,255,0.95);
            padding: 0 1rem;
            position: relative;
        }

        /* Loading animation */
        .btn-loading {
            position: relative;
            pointer-events: none;
        }

        .btn-loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 2px solid transparent;
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 576px) {
            .login-container {
                margin: 1rem;
                padding: 2rem;
                border-radius: 20px;
            }

            .login-header h1 {
                font-size: 1.5rem;
            }

            .brand-icon {
                font-size: 2.5rem;
            }
        }

        /* Ripple effect */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0);
            animation: ripple-animation 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple-animation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-header">
        <div class="brand-icon">
            <i class="bi bi-car-front-fill"></i>
        </div>
        <h1 th:text="#{app.title}">Car Rental Pro</h1>
        <p class="subtitle" th:text="#{login.subtitle}">Welcome! Please sign in to your account</p>
    </div>

    <!-- Error Messages -->
    <div th:if="${param.error}" class="alert alert-danger">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="#{login.error}">Invalid username or password</span>
    </div>

    <div th:if="${param.logout}" class="alert alert-success">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="#{login.success}">Logged out successfully</span>
    </div>

    <div th:if="${message}" class="alert alert-info">
        <i class="bi bi-info-circle-fill me-2"></i>
        <span th:text="${message}"></span>
    </div>

    <!-- Login Form -->
    <form th:action="@{/login}" method="post" id="loginForm">
        <div class="form-group">
            <i class="bi bi-person input-icon"></i>
            <div class="input-wrapper">
                <label for="username" th:text="#{login.username}">Username</label>
                <input type="text" class="form-control" id="username" name="username"
                       placeholder="Enter username" required autocomplete="username">
            </div>
        </div>

        <div class="form-group">
            <i class="bi bi-lock input-icon"></i>
            <div class="input-wrapper">
                <label for="password" th:text="#{login.password}">Password</label>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="Enter password" required autocomplete="current-password">
            </div>
        </div>

        <button type="submit" class="btn login-btn" id="loginButton">
            <i class="bi bi-box-arrow-in-right me-2"></i>
            <span th:text="#{login.submit}">Sign In</span>
        </button>
    </form>

    <!-- Register Link -->
    <div class="register-link">
        <a th:href="@{/register}">
            <i class="bi bi-person-plus me-1"></i>
            <span th:text="#{login.register}">Don't have an account? Register here</span>
        </a>
    </div>

    <div class="divider">
        <span th:text="#{login.or}">or</span>
    </div>

    <!-- Language Selector -->
    <div class="language-selector">
        <i class="bi bi-globe me-2"></i>
        <a href="?lang=en">🇺🇸 English</a>
        <a href="?lang=pl">🇵🇱 Polski</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Animate login container on load
        const container = document.querySelector('.login-container');
        container.style.opacity = '0';
        container.style.transform = 'translateY(30px)';
        container.style.transition = 'opacity 0.8s ease, transform 0.8s ease';

        setTimeout(() => {
            container.style.opacity = '1';
            container.style.transform = 'translateY(0)';
        }, 100);

        // Add ripple effect to login button
        const loginButton = document.getElementById('loginButton');
        loginButton.addEventListener('click', function(e) {
            const ripple = document.createElement('span');
            const rect = this.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            const x = e.clientX - rect.left - size / 2;
            const y = e.clientY - rect.top - size / 2;

            ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            ripple.classList.add('ripple');

            this.style.position = 'relative';
            this.style.overflow = 'hidden';
            this.appendChild(ripple);

            setTimeout(() => {
                ripple.remove();
            }, 600);
        });

        // Form submission loading state
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', function() {
            loginButton.classList.add('btn-loading');
            loginButton.querySelector('span').style.opacity = '0';
        });

        // Focus enhancement
        const inputs = document.querySelectorAll('.input-wrapper input');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                const icon = this.closest('.form-group').querySelector('.input-icon');
                if (icon) icon.style.color = 'var(--secondary-color)';
            });

            input.addEventListener('blur', function() {
                const icon = this.closest('.form-group').querySelector('.input-icon');
                if (!this.value && icon) {
                    icon.style.color = 'var(--secondary-color)';
                }
            });
        });
    });
</script>
</body>
</html>
