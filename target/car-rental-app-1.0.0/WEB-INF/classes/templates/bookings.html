<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{booking.title}">Bookings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#" th:text="#{nav.home}">Car Rental</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="@{/dashboard}" th:text="#{nav.dashboard}">Dashboard</a>
            <a class="nav-link active" th:href="@{/bookings}" th:text="#{nav.bookings}">Bookings</a>
            <a class="nav-link" th:href="@{/cars}" th:text="#{nav.cars}" sec:authorize="hasAnyRole('ADMIN','MANAGER')">Cars</a>
            <a class="nav-link" th:href="@{/users}" th:text="#{nav.users}" sec:authorize="hasRole('ADMIN')">Users</a>
            <form class="d-inline" th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-light" th:text="#{nav.logout}">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 th:text="#{booking.title}">Bookings</h2>
                <a th:href="@{/bookings/new}" class="btn btn-success" th:text="#{booking.new}" sec:authorize="hasRole('CUSTOMER')">New Booking</a>
            </div>

            <div class="table-responsive">
                <table class="table table-striped">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th th:text="#{booking.car}">Car</th>
                        <th>Customer</th>
                        <th th:text="#{booking.startDate}">Start Date</th>
                        <th th:text="#{booking.endDate}">End Date</th>
                        <th th:text="#{booking.totalAmount}">Total Amount</th>
                        <th th:text="#{booking.status}">Status</th>
                        <th th:text="#{booking.actions}">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="booking : ${bookings}">
                        <td th:text="${booking.id}"></td>
                        <td th:text="${booking.car.brand + ' ' + booking.car.model}"></td>
                        <td th:text="${booking.customer.firstName + ' ' + booking.customer.lastName}"></td>
                        <td th:text="${booking.startDate}"></td>
                        <td th:text="${booking.endDate}"></td>
                        <td th:text="' + ${booking.totalAmount}"></td>
                        <td>
                                    <span th:text="${booking.status}"
                                          th:class="${booking.status.name() == 'CONFIRMED' ? 'badge bg-success' :
                                                    booking.status.name() == 'PENDING' ? 'badge bg-warning' :
                                                    booking.status.name() == 'PAID' ? 'badge bg-primary' :
                                                    booking.status.name() == 'CANCELLED' ? 'badge bg-danger' : 'badge bg-secondary'}"></span>
                        </td>
                        <td>
                            <div class="btn-group" role="group">
                                <form th:if="${booking.status.name() == 'PENDING'}" th:action="@{/bookings/{id}/confirm(id=${booking.id})}" method="post" class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-success" th:text="#{booking.confirm}" sec:authorize="hasAnyRole('ADMIN','MANAGER')">Confirm</button>
                                </form>

                                <form th:if="${booking.status.name() == 'CONFIRMED'}" th:action="@{/bookings/{id}/pay(id=${booking.id})}" method="post" class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-primary" th:text="#{booking.pay}">Pay</button>
                                </form>

                                <form th:if="${booking.status.name() != 'CANCELLED' and booking.status.name() != 'PAID'}" th:action="@{/bookings/{id}/cancel(id=${booking.id})}" method="post" class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-danger" th:text="#{booking.cancel}">Cancel</button>
                                </form>

                                <a th:if="${booking.status.name() == 'PAID' and booking.invoice != null}"
                                   th:href="@{/bookings/{id}/invoice(id=${booking.id})}"
                                   class="btn btn-sm btn-info" th:text="#{booking.invoice}">Invoice</a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-12">
            <div class="text-center">
                <a th:href="@{/bookings(lang=en)}">English</a> |
                <a th:href="@{/bookings(lang=pl)}">Polski</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
