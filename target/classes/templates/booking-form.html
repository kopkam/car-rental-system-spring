<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Rental - New Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">Car Rental</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/dashboard">Back to Dashboard</a>
            <a class="btn btn-outline-light" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card">
                <div class="card-header">
                    <h3><i class="bi bi-calendar-plus"></i> New Booking</h3>
                </div>
                <div class="card-body">
                    <!-- Error Messages -->
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:object="${booking}" th:action="@{/bookings}" method="post">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="car" class="form-label">Select Car *</label>
                                    <select class="form-select" th:field="*{car}" required>
                                        <option value="">Choose a car...</option>
                                        <option th:each="car : ${availableCars}"
                                                th:value="${car.id}"
                                                th:text="${car.brand + ' ' + car.model + ' (' + car.year + ') - ' + car.dailyRate + ' PLN/day'}">
                                            Car Option
                                        </option>
                                    </select>
                                    <div th:if="${#fields.hasErrors('car')}" class="text-danger" th:errors="*{car}"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="customer" class="form-label">Customer</label>
                                    <input type="text" class="form-control"
                                           th:value="${currentUser.firstName + ' ' + currentUser.lastName}"
                                           readonly>
                                    <input type="hidden" th:field="*{customer}" th:value="${currentUser.id}">
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="startDate" class="form-label">Start Date *</label>
                                    <input type="date" class="form-control" th:field="*{startDate}" required>
                                    <div th:if="${#fields.hasErrors('startDate')}" class="text-danger" th:errors="*{startDate}"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="endDate" class="form-label">End Date *</label>
                                    <input type="date" class="form-control" th:field="*{endDate}" required>
                                    <div th:if="${#fields.hasErrors('endDate')}" class="text-danger" th:errors="*{endDate}"></div>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="pickupLocation" class="form-label">Pickup Location *</label>
                                    <input type="text" class="form-control" th:field="*{pickupLocation}"
                                           placeholder="e.g., Warsaw Airport" required>
                                    <div th:if="${#fields.hasErrors('pickupLocation')}" class="text-danger" th:errors="*{pickupLocation}"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="dropoffLocation" class="form-label">Drop-off Location *</label>
                                    <input type="text" class="form-control" th:field="*{dropoffLocation}"
                                           placeholder="e.g., Krakow City Center" required>
                                    <div th:if="${#fields.hasErrors('dropoffLocation')}" class="text-danger" th:errors="*{dropoffLocation}"></div>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="specialRequests" class="form-label">Special Requests</label>
                            <textarea class="form-control" th:field="*{specialRequests}" rows="3"
                                      placeholder="Any special requests or notes..."></textarea>
                        </div>

                        <div class="card bg-light mb-3">
                            <div class="card-body">
                                <h5 class="card-title">Booking Summary</h5>
                                <div class="row">
                                    <div class="col-md-6">
                                        <p><strong>Customer:</strong> <span th:text="${currentUser.firstName + ' ' + currentUser.lastName}">Customer Name</span></p>
                                        <p><strong>Email:</strong> <span th:text="${currentUser.email}">customer@email.com</span></p>
                                    </div>
                                    <div class="col-md-6">
                                        <p><strong>Status:</strong> <span class="badge bg-warning">Pending</span></p>
                                        <p><strong>Total Cost:</strong> <span class="text-success fw-bold">Will be calculated after car selection</span></p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="/dashboard" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> Create Booking
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Auto-set minimum date to today
    document.addEventListener('DOMContentLoaded', function() {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('startDate').min = today;
        document.getElementById('endDate').min = today;

        // Update end date minimum when start date changes
        document.getElementById('startDate').addEventListener('change', function() {
            document.getElementById('endDate').min = this.value;
        });
    });
</script>
</body>
</html>
