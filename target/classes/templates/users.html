<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">Car Rental</a>
        <div class="navbar-nav ms-auto">
            <form class="d-inline" th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-light">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1>Users Management</h1>
                <a href="/users/new" class="btn btn-success">Add New User</a>
            </div>

            <!-- Success/Error Messages -->
            <div th:if="${param.success}" class="alert alert-success">
                User created successfully!
            </div>
            <div th:if="${param.updated}" class="alert alert-success">
                User updated successfully!
            </div>
            <div th:if="${param.deleted}" class="alert alert-success">
                User deleted successfully!
            </div>
            <div th:if="${param.error}" class="alert alert-danger">
                User not found!
            </div>

            <div class="card">
                <div class="card-header">
                    <h5>All Users</h5>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped">
                            <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Username</th>
                                <th>Email</th>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>Roles</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.id}">1</td>
                                <td th:text="${user.username}">admin</td>
                                <td th:text="${user.email}">admin@example.com</td>
                                <td th:text="${user.firstName}">John</td>
                                <td th:text="${user.lastName}">Doe</td>
                                <td>
                                        <span th:each="role : ${user.roles}"
                                              th:text="${role.name}"
                                              class="badge bg-primary me-1">ADMIN</span>
                                </td>
                                <td>
                                    <span th:if="${user.enabled}" class="badge bg-success">Active</span>
                                    <span th:unless="${user.enabled}" class="badge bg-danger">Inactive</span>
                                </td>
                                <td>
                                    <div class="btn-group" role="group">
                                        <a th:href="@{/users/{id}/edit(id=${user.id})}"
                                           class="btn btn-sm btn-primary">Edit</a>

                                        <form th:action="@{/users/{id}/toggle-status(id=${user.id})}"
                                              method="post" class="d-inline">
                                            <button type="submit"
                                                    th:class="${user.enabled} ? 'btn btn-sm btn-warning' : 'btn btn-sm btn-success'"
                                                    th:text="${user.enabled} ? 'Disable' : 'Enable'">
                                                Toggle
                                            </button>
                                        </form>

                                        <form th:action="@{/users/{id}/delete(id=${user.id})}"
                                              method="post"
                                              class="d-inline"
                                              onsubmit="return confirm('Are you sure you want to delete this user?')">
                                            <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="mt-3">
                <a href="/dashboard" class="btn btn-secondary">Back to Dashboard</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
