<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Rental - Add Car</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/dashboard">Car Rental</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/cars">Back to Cars</a>
            <a class="btn btn-outline-light" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h3><i class="bi bi-plus-circle"></i> Add New Car</h3>
                </div>
                <div class="card-body">
                    <form th:object="${car}" th:action="@{/cars/add}" method="post">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="brand" class="form-label">Brand *</label>
                                    <input type="text" class="form-control" th:field="*{brand}" required>
                                    <div th:if="${#fields.hasErrors('brand')}" class="text-danger" th:errors="*{brand}"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="model" class="form-label">Model *</label>
                                    <input type="text" class="form-control" th:field="*{model}" required>
                                    <div th:if="${#fields.hasErrors('model')}" class="text-danger" th:errors="*{model}"></div>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="year" class="form-label">Year *</label>
                                    <input type="number" class="form-control" th:field="*{year}" min="1990" max="2025" required>
                                    <div th:if="${#fields.hasErrors('year')}" class="text-danger" th:errors="*{year}"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="licensePlate" class="form-label">License Plate *</label>
                                    <input type="text" class="form-control" th:field="*{licensePlate}" required>
                                    <div th:if="${#fields.hasErrors('licensePlate')}" class="text-danger" th:errors="*{licensePlate}"></div>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="dailyRate" class="form-label">Daily Rate (PLN) *</label>
                                    <input type="number" class="form-control" th:field="*{dailyRate}" step="0.01" min="0" required>
                                    <div th:if="${#fields.hasErrors('dailyRate')}" class="text-danger" th:errors="*{dailyRate}"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="status" class="form-label">Status *</label>
                                    <select class="form-select" th:field="*{status}" required>
                                        <option value="">Select Status</option>
                                        <option value="AVAILABLE">Available</option>
                                        <option value="RENTED">Rented</option>
                                        <option value="MAINTENANCE">Maintenance</option>
                                    </select>
                                    <div th:if="${#fields.hasErrors('status')}" class="text-danger" th:errors="*{status}"></div>
                                </div>
                            </div>
                        </div>

                        <!-- ✅ NOWE POLE - Manager Selection (tylko dla adminów) -->
                        <div sec:authorize="hasRole('ROLE_ADMIN')" class="mb-3">
                            <label for="manager" class="form-label">Assign to Manager</label>
                            <select class="form-select" th:field="*{manager.id}" id="manager">
                                <option value="">-- No Manager (Admin managed) --</option>
                                <option th:each="manager : ${managers}"
                                        th:value="${manager.id}"
                                        th:text="${manager.firstName + ' ' + manager.lastName + ' (' + manager.username + ')'}">
                                    Manager Name
                                </option>
                            </select>
                            <small class="form-text text-muted">Select a manager to assign this car to, or leave empty for admin management.</small>
                        </div>

                        <!-- ✅ INFO dla managerów -->
                        <div sec:authorize="hasRole('ROLE_MANAGER')" class="mb-3">
                            <div class="alert alert-info">
                                <i class="bi bi-info-circle"></i> This car will be automatically assigned to you as the manager.
                            </div>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="/cars" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> Add Car
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
